name: "AI PR Review Action"
description: "Reviews Pull Requests using OpenAI and posts comments"
author: "Pulkit Gupta"

inputs:
  github_token:
    description: "GitHub token"
    required: true
  openai_api_key:
    description: "OpenAI API key"
    required: true
  model:
    description: "Model name"
    required: false
    default: "gpt-4o-mini"
  min_score:
    description: "Minimum score required to pass PR"
    required: false
    default: "7" 
  critical_weight:
    description: "Points deducted per critical issue"
    required: false
    default: "3"
  major_weight:
    description: "Points deducted per major issue"
    required: false
    default: "2"
  minor_weight:
    description: "Points deducted per minor issue"
    required: false
    default: "1"    

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "code"
  color: "blue"